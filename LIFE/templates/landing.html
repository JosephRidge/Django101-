<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>

<body>

 <div class="container">
    <div id="carouselExample" class="carousel slide my-5 ">
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="https://images.pexels.com/photos/417173/pexels-photo-417173.jpeg" 
                class="d-block w-100 rounded-5"
                alt="..." height="500">
            </div>
            <div class="carousel-item">
                <img src="https://images.pexels.com/photos/459225/pexels-photo-459225.jpeg"
                class="d-block w-100 rounded-5"
                alt="..." height="500">
            </div>
            <div class="carousel-item">
                <img src="https://images.pexels.com/photos/460672/pexels-photo-460672.jpeg" 
                class="d-block w-100 rounded-5"
                    alt="..." height="500">
            </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
            <span class="carousel-control-prev-icon bg-dark rounded-circle m-2 " aria-hidden="true"></span>
            <span class="visually-hidden  ">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
            <span class="carousel-control-next-icon bg-dark rounded-circle m-2 " aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
        </button>
    </div>

    <div class="m-5 d-flex justify-content-center">
        <a href="{% url 'home' %}" class="bg-dark text-white px-5 py-3 m-4 rounded-3 text-decoration-none" >Get Started</a>
    </div>

 </div>
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

</body>

</html>
