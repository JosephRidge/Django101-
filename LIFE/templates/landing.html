{% extends 'base.html' %}
{% load static %}
{% block content %}
<div class="container">
    <div id="carouselExample" class="carousel slide mt-5 mb-2 rounded-5">
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="https://images.pexels.com/photos/417173/pexels-photo-417173.jpeg"
                    class="d-block object-fit-cover w-100 rounded-5" alt="..." height="500">
            </div>
            <div class="carousel-item">
                <img src="https://images.pexels.com/photos/459225/pexels-photo-459225.jpeg"
                    class="d-block object-fit-cover w-100 rounded-5" alt="..." height="500">
            </div>
            <div class="carousel-item">
                <img src="https://images.pexels.com/photos/460672/pexels-photo-460672.jpeg"
                    class="d-block object-fit-cover w-100 rounded-5 object-contain" alt="..." height="500">
            </div>
        </div>
        <button class="carousel-control-prev bg-dark rounded-start-5" type="button" data-bs-target="#carouselExample"
            data-bs-slide="prev">
            <span class="carousel-control-prev-icon  " aria-hidden="true"></span>
            <span class="visually-hidden  ">Previous</span>
        </button>
        <button class="carousel-control-next bg-dark rounded-end-5" type="button" data-bs-target="#carouselExample"
            data-bs-slide="next">
            <span class="carousel-control-next-icon  " aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
        </button>
    </div>

    <div class=" d-flex justify-content-center">
        <a href="{% url 'home' %}" class="bg-dark text-white px-5 py-3 m-4 rounded-5 text-decoration-none">Get
            Started</a>
    </div>

    <img src="{% static '/images/fish.jpg' %}" 
    width="200" height="200" alt="">
    <video width="320" height="240" controls>
        <source src="{% static '/videos/jelly_fishs.mp4' %}"
         type="video/mp4">
        Your browser does not support the video tag.
    </video>
</div>
{% endblock %}
